│   │   │   │       if (mark.value != null && mark.value != 0) return '${mark.value}';
│   │   │   │       if ((mark.customMark ?? '').trim().isNotEmpty)
│   │   │   │         return mark.customMark!.trim();
│   │   │   │       if (mark.absent == true) return 'Н';
