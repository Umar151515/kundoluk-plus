│   │   │       
│   │   │         Future<void> _initBiometric() async {
│   │   │           final available = await widget.appLock.canUseBiometrics();
│   │   │           if (!mounted) return;
│   │   │           setState(() => _biometricAvailable = available);
│   │   │           if (available && widget.appLock.biometricEnabled) {
│   │   │             await _tryBiometric(auto: true);
│   │   │           }
│   │   │         }
│   │   │       
│   │   │         void dispose() {
