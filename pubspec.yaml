│   │   │   │       final parts = <String>[];
│   │   │   │       for (final mark in marks) {
│   │   │   │         final value = _markLabel(mark);
│   │   │   │         if (value.trim().isEmpty || value.trim() == '—') continue;
│   │   │   │         parts.add(value);
│   │   │   │       }
│   │   │   │       if (parts.isEmpty) return '—';
