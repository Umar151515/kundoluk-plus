│   │   │           if (!ok) {
│   │   │             setState(() => _bad = true);
│   │   │             return;
│   │   │           }
│   │   │           widget.onUnlocked();
│   │   │         }
│   │   │       
│   │   │         Future<void> _tryBiometric({bool auto = false}) async {
│   │   │           if (_authInProgress) return;
