│   │   class _AppGateState extends State<AppGate> with WidgetsBindingObserver {
│   │     bool _locked = false;
│   │     DateTime? _backgroundedAt;
│   │     DateTime? _justUnlockedAt;
│   │   
│   │     @override
│   │     void initState() {
│   │       super.initState();
│   │       WidgetsBinding.instance.addObserver(this);
│   │       _locked = widget.appLock.enabled && widget.appLock.hasPasscode;
│   │     }
│   │   
│   │     @override
│   │     void dispose() {
│   │       WidgetsBinding.instance.removeObserver(this);
│   │       super.dispose();
│   │     }
│   │   
│   │     @override
│   │     void didUpdateWidget(covariant AppGate oldWidget) {
│   │       super.didUpdateWidget(oldWidget);
│   │       final shouldLock = widget.appLock.enabled && widget.appLock.hasPasscode;
│   │       if (shouldLock != _locked) {
│   │         setState(() => _locked = shouldLock);
│   │       }
│   │     }
│   │   
│   │     @override
│   │     void didChangeAppLifecycleState(AppLifecycleState state) {
│   │       if (!(widget.appLock.enabled && widget.appLock.hasPasscode)) return;
│   │   
│   │       // On Android the biometric prompt may transiently pause/resume the app.
│   │       // Don't treat that as backgrounding, otherwise "timeout immediately" can cause a relock loop.
│   │       if (widget.appLock.biometricAuthInProgress) return;
│   │   
│   │       if (state == AppLifecycleState.paused || state == AppLifecycleState.inactive) {
│   │         _backgroundedAt = DateTime.now();
│   │       }
│   │   
│   │       if (state == AppLifecycleState.resumed) {
│   │         final justUnlockedAt = _justUnlockedAt;
│   │         if (justUnlockedAt != null &&
│   │             DateTime.now().difference(justUnlockedAt).inMilliseconds < 1200) {
│   │           return;
│   │         }
│   │         final t = widget.appLock.timeoutSec;
│   │         if (t <= 0) {
│   │           setState(() => _locked = true);
│   │           return;
│   │         }
│   │         final bgAt = _backgroundedAt;
│   │         if (bgAt != null) {
│   │           final diff = DateTime.now().difference(bgAt).inSeconds;
│   │           if (diff >= t) setState(() => _locked = true);
│   │         }
│   │       }
│   │     }
│   │   
│   │     @override
│   │     Widget build(BuildContext context) {
│   │       if (_locked) {
│   │         return AppLockScreen(
│   │           appLock: widget.appLock,
│   │           onUnlocked: () => setState(() {
│   │             _locked = false;
│   │             _backgroundedAt = null;
│   │             _justUnlockedAt = DateTime.now();
│   │           }),
│   │         );
│   │       }
│   │   
│   │       if (!widget.auth.hasAnyAccount || !widget.auth.hasActiveAccount) {
│   │         return LoginScreen(
│   │           api: widget.api,
│   │           auth: widget.auth,
│   │           settings: widget.settings,
│   │           appLock: widget.appLock,
│   │         );
│   │       }
│   │   
│   │       return HomeScreen(
│   │         api: widget.api,
│   │         auth: widget.auth,
│   │         settings: widget.settings,
│   │         appLock: widget.appLock,
│   │       );
│   │     }
│   │   }
